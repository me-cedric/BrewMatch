name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Swift version
        run: swift --version
      - name: Package sanity
        run: swift package describe
      - name: Build
        run: swift build
      - name: Test
        run: swift test
