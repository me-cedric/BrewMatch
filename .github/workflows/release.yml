name: Release Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version
        required: true
        default: 0.1.0

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Swift version
        run: swift --version
      - name: Build release binary
        run: swift build -c release
      - name: Archive binary
        run: |
          mkdir -p dist
          cp .build/release/brewmatch dist/brewmatch
          tar -czf "dist/brewmatch-${{ inputs.version }}-macos.tar.gz" -C dist brewmatch
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: brewmatch-${{ inputs.version }}-macos
          path: dist/brewmatch-${{ inputs.version }}-macos.tar.gz
