name: Bug report
description: Report a BrewMatch bug
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Thanks for reporting a bug. Do not include secrets or private paths unless sanitized."
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Commands and minimal setup.
      placeholder: |
        1. Run `brewmatch scan`
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: BrewMatch version or commit
  - type: input
    id: macos
    attributes:
      label: macOS version
  - type: textarea
    id: output
    attributes:
      label: Sanitized output
      render: text
